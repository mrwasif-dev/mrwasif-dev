<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp QR Connector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #075e54;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header i {
            font-size: 60px;
            color: #25d366;
            background: #dcf8c6;
            padding: 15px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .status-box {
            background: #f0f2f4;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .connected { color: #25d366; font-weight: bold; }
        .disconnected { color: #dc3545; font-weight: bold; }
        .qr-box {
            background: white;
            border: 2px dashed #25d366;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #qrImage {
            max-width: 200px;
            width: 100%;
            display: none;
        }
        .btn {
            background: #25d366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
        }
        .btn:hover {
            background: #075e54;
        }
        .steps {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 14px;
        }
        .step {
            padding: 5px 0;
        }
        .api-url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <i class="fab fa-whatsapp"></i>
            <h2>WhatsApp OTP System</h2>
        </div>

        <!-- Status -->
        <div class="status-box" id="statusBox">
            <div id="statusText" class="disconnected">Checking...</div>
            <div id="statusInfo" style="font-size: 13px; margin-top: 5px;"></div>
        </div>

        <!-- QR Code -->
        <div class="qr-box" id="qrBox">
            <div id="qrPlaceholder">
                <i class="fas fa-qrcode" style="font-size: 50px; color: #ccc;"></i>
                <p style="margin-top: 10px;">No QR available</p>
            </div>
            <img id="qrImage" src="" alt="QR Code">
        </div>

        <!-- Buttons -->
        <button class="btn" onclick="getQR()">
            <i class="fas fa-qrcode"></i> Get QR Code
        </button>
        
        <button class="btn" onclick="checkStatus()" style="background: #075e54;">
            <i class="fas fa-sync-alt"></i> Refresh Status
        </button>

        <!-- Steps -->
        <div class="steps">
            <div class="step">1️⃣ Click "Get QR Code"</div>
            <div class="step">2️⃣ Open WhatsApp → Linked Devices</div>
            <div class="step">3️⃣ Scan QR code</div>
            <div class="step">4️⃣ Status will show "Connected"</div>
        </div>

        <!-- API URL -->
        <div class="api-url" id="apiUrl">
            Loading...
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // ========== YOUR HEROKU URL ==========
        const API_URL = 'https://optosystm-2cfc9fe49097.herokuapp.com';
        
        document.getElementById('apiUrl').innerHTML = 
            '<i class="fas fa-link"></i> API: ' + API_URL;

        // ========== CHECK STATUS ==========
        async function checkStatus() {
            try {
                const res = await fetch(API_URL + '/status');
                const data = await res.json();
                
                const statusText = document.getElementById('statusText');
                const statusInfo = document.getElementById('statusInfo');
                
                if (data.connected) {
                    statusText.innerHTML = '✅ Connected';
                    statusText.className = 'connected';
                    statusInfo.innerHTML = `Active OTPs: ${data.active}`;
                } else {
                    statusText.innerHTML = '❌ Disconnected';
                    statusText.className = 'disconnected';
                    statusInfo.innerHTML = data.qr ? 'QR ready - Click Get QR' : 'Waiting for QR...';
                }
            } catch (error) {
                document.getElementById('statusText').innerHTML = '❌ Server Error';
            }
        }

        // ========== GET QR CODE ==========
        async function getQR() {
            try {
                const res = await fetch(API_URL + '/qr');
                const data = await res.json();
                
                const qrImage = document.getElementById('qrImage');
                const qrPlaceholder = document.getElementById('qrPlaceholder');
                
                if (data.success && data.qr) {
                    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.qr)}`;
                    qrImage.style.display = 'block';
                    qrPlaceholder.style.display = 'none';
                } else if (data.message === 'Connected') {
                    alert('WhatsApp already connected!');
                } else {
                    alert('No QR available. Try again.');
                }
            } catch (error) {
                alert('Error getting QR');
            }
        }

        // ========== AUTO REFRESH ==========
        setInterval(checkStatus, 3000);
        window.onload = checkStatus;
    </script>
</body>
</html>
